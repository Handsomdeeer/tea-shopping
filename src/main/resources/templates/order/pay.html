<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('订单支付')"></head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="main-content">
        <div class="container" style="max-width:500px;">
            <h2 style="margin-bottom:20px;">订单支付</h2>

            <div class="card">
                <div class="card-body" style="text-align:center;">
                    <p style="color:#666;font-size:14px;">订单号：<span id="order-id"></span></p>
                    <p style="font-size:32px;font-weight:700;color:#e74c3c;margin:10px 0;" id="pay-amount">¥0.00</p>

                    <div style="display:flex;justify-content:center;gap:20px;margin:20px 0;">
                        <label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:10px 20px;border:2px solid var(--primary);border-radius:var(--radius);">
                            <input type="radio" name="payType" value="WECHAT" checked>
                            <span>微信支付</span>
                        </label>
                        <label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:10px 20px;border:2px solid var(--border);border-radius:var(--radius);">
                            <input type="radio" name="payType" value="ALIPAY">
                            <span>支付宝</span>
                        </label>
                    </div>

                    <div class="pay-qrcode" id="qrcode-area" style="display:none;">
                        <img id="qrcode-img" src="" alt="支付二维码">
                        <p style="font-size:14px;color:#666;">请使用微信扫一扫完成支付</p>
                        <p class="pay-timer" id="pay-timer">支付剩余时间：30:00</p>
                        <button class="btn btn-primary btn-lg" onclick="confirmPay()" style="width:100%;margin-top:16px;">我已支付，确认付款</button>
                    </div>

                    <button class="btn btn-primary btn-lg" id="btn-pay" onclick="generateQrcode()" style="width:100%;margin-top:10px;">生成支付二维码</button>

                    <div style="margin-top:20px;">
                        <a href="/order/detail?orderId=" id="order-link" style="font-size:13px;color:#999;">查看订单详情</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/header :: footer"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script th:replace="fragments/header :: scripts"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const orderId = params.get('orderId');
        let timer = null;
        let countdown = 1800;
        let checkTimer = null;

        document.getElementById('order-id').textContent = orderId;
        document.getElementById('order-link').href = '/order/detail?orderId=' + orderId;

        async function loadOrder() {
            try {
                const data = await get('/orders/' + orderId);
                document.getElementById('pay-amount').textContent = formatPrice(data.data.payAmount);
            } catch (e) {}
        }

        async function generateQrcode() {
            const type = document.querySelector('input[name="payType"]:checked').value;
            try {
                const data = await post('/payment/qrcode', { orderId, payType: type });
                const result = data.data;

                document.getElementById('qrcode-area').style.display = 'block';
                document.getElementById('qrcode-img').src = result.qrcodeUrl;
                document.getElementById('btn-pay').style.display = 'none';
                countdown = result.expireTime || 1800;
                startTimer();
                startCheckStatus();
            } catch (e) {}
        }

        function startTimer() {
            updateTimerDisplay();
            timer = setInterval(() => {
                countdown--;
                updateTimerDisplay();
                if (countdown <= 0) {
                    clearInterval(timer);
                    clearInterval(checkTimer);
                    showToast('支付已超时', 'error');
                    document.getElementById('btn-pay').style.display = 'block';
                    document.getElementById('qrcode-area').style.display = 'none';
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const min = Math.floor(countdown / 60).toString().padStart(2, '0');
            const sec = (countdown % 60).toString().padStart(2, '0');
            document.getElementById('pay-timer').textContent = '支付剩余时间：' + min + ':' + sec;
        }

        async function confirmPay() {
            try {
                await put('/orders/' + orderId + '/pay', {});
                showToast('支付成功！');
                clearInterval(timer);
                clearInterval(checkTimer);
                setTimeout(() => location.href = '/order/detail?orderId=' + orderId, 1500);
            } catch (e) {}
        }

        function startCheckStatus() {
            checkTimer = setInterval(async () => {
                try {
                    const data = await get('/payment/status/' + orderId);
                    if (data.data.payStatus === 1) {
                        clearInterval(timer);
                        clearInterval(checkTimer);
                        showToast('支付成功！');
                        setTimeout(() => location.href = '/order/detail?orderId=' + orderId, 1500);
                    }
                } catch (e) {}
            }, 3000);
        }

        loadOrder();
    </script>
</body>
</html>
