<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('订单详情')"></head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="main-content">
        <div class="container" style="max-width:800px;">
            <h2 style="margin-bottom:20px;">订单详情</h2>

            <div class="card" id="order-card" style="display:none;">
                <div class="card-body">
                    <!-- 步骤条 -->
                    <div class="steps" id="steps"></div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
                        <div>
                            <h4 style="font-size:14px;color:#999;margin-bottom:8px;">订单信息</h4>
                            <p style="font-size:14px;">订单号：<span id="order-no"></span></p>
                            <p style="font-size:14px;">创建时间：<span id="create-time"></span></p>
                            <p style="font-size:14px;" id="pay-time-row">支付时间：<span id="pay-time"></span></p>
                            <p style="font-size:14px;" id="delivery-time-row">发货时间：<span id="delivery-time"></span></p>
                        </div>
                        <div>
                            <h4 style="font-size:14px;color:#999;margin-bottom:8px;">收货信息</h4>
                            <p style="font-size:14px;">收件人：<span id="receiver"></span></p>
                            <p style="font-size:14px;">手机号：<span id="receiver-phone"></span></p>
                            <p style="font-size:14px;">地址：<span id="receiver-address"></span></p>
                        </div>
                    </div>

                    <h4 style="font-size:14px;color:#999;margin-bottom:12px;">商品清单</h4>
                    <div id="item-list" style="margin-bottom:20px;"></div>

                    <div style="text-align:right;border-top:1px solid var(--border);padding-top:16px;">
                        <p style="font-size:14px;color:#666;">商品总额：<span id="total-amount"></span></p>
                        <p style="font-size:14px;color:#666;">运费：<span id="freight-amount"></span></p>
                        <p style="font-size:18px;font-weight:700;color:#e74c3c;margin-top:8px;">实付金额：<span id="pay-amount"></span></p>
                    </div>

                    <div style="text-align:right;margin-top:16px;" id="detail-actions"></div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/header :: footer"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script th:replace="fragments/header :: scripts"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const orderId = params.get('orderId');

        async function loadOrder() {
            if (!orderId) return;
            try {
                const data = await get('/orders/' + orderId);
                const o = data.data;

                document.getElementById('order-card').style.display = 'block';
                document.getElementById('order-no').textContent = o.orderNo;
                document.getElementById('create-time').textContent = o.createTime;
                document.getElementById('pay-time').textContent = o.payTime || '-';
                document.getElementById('delivery-time').textContent = o.deliveryTime || '-';
                document.getElementById('receiver').textContent = o.receiverName;
                document.getElementById('receiver-phone').textContent = o.receiverPhone;
                document.getElementById('receiver-address').textContent = o.receiverAddress;
                document.getElementById('total-amount').textContent = formatPrice(o.totalAmount);
                document.getElementById('freight-amount').textContent = formatPrice(o.freightAmount);
                document.getElementById('pay-amount').textContent = formatPrice(o.payAmount);

                if (!o.payTime) document.getElementById('pay-time-row').style.display = 'none';
                if (!o.deliveryTime) document.getElementById('delivery-time-row').style.display = 'none';

                // 步骤条
                const steps = document.getElementById('steps');
                if (o.status === 4) {
                    steps.innerHTML = '<div style="text-align:center;color:#e74c3c;font-size:16px;font-weight:600;padding:20px;">订单已取消</div>';
                } else {
                    const statusMap = ['待付款', '待发货', '待收货', '已完成'];
                    let stepHtml = '';
                    for (let i = 0; i < 4; i++) {
                        let cls = '';
                        if (i < o.status) cls = 'completed';
                        else if (i === o.status) cls = 'active';
                        stepHtml += `
                            <div class="step ${cls}">
                                <div class="step-circle">${i < o.status ? '✓' : i + 1}</div>
                                <div class="step-title">${statusMap[i]}</div>
                            </div>
                        `;
                    }
                    steps.innerHTML = stepHtml;
                }

                // 商品
                const list = document.getElementById('item-list');
                list.innerHTML = '';
                o.itemList.forEach(item => {
                    const div = document.createElement('div');
                    div.style.display = 'flex';
                    div.style.alignItems = 'center';
                    div.style.gap = '14px';
                    div.style.padding = '10px 0';
                    div.style.borderBottom = '1px solid #f0f0f0';
                    div.innerHTML = `
                        <img src="${item.productImage || '/images/default.jpg'}" style="width:70px;height:70px;object-fit:cover;border-radius:6px;">
                        <div style="flex:1;">
                            <div style="font-size:14px;">${item.productName}</div>
                            <div style="font-size:13px;color:#999;">${formatPrice(item.price)} x ${item.quantity}</div>
                        </div>
                        <div style="font-weight:600;">${formatPrice(item.subtotal)}</div>
                    `;
                    list.appendChild(div);
                });

                // 操作
                const actions = document.getElementById('detail-actions');
                let html = '';
                if (o.status === 0) {
                    html += '<a href="/order/pay?orderId=' + o.orderId + '" class="btn btn-primary">去支付</a>';
                    html += '<button class="btn btn-danger" style="margin-left:10px;" onclick="cancelOrder()">取消订单</button>';
                } else if (o.status === 2) {
                    html += '<button class="btn btn-primary" onclick="confirmReceive()">确认收货</button>';
                } else if (o.status === 3) {
                    html += '<a href="/review?orderId=' + o.orderId + '" class="btn btn-secondary">去评价</a>';
                }
                actions.innerHTML = html;
            } catch (e) {}
        }

        async function cancelOrder() {
            if (!await confirmDialog('确定取消该订单吗？')) return;
            try {
                await put('/orders/' + orderId + '/cancel', { reason: '用户取消' });
                showToast('订单已取消');
                loadOrder();
            } catch (e) {}
        }

        async function confirmReceive() {
            if (!await confirmDialog('确认已收到商品吗？')) return;
            try {
                await put('/orders/' + orderId + '/confirm', {});
                showToast('确认收货成功');
                loadOrder();
            } catch (e) {}
        }

        loadOrder();
    </script>
</body>
</html>
