<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('个人中心')"></head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="main-content">
        <div class="container">
            <div class="user-layout">
                <aside class="user-sidebar">
                    <div class="user-profile-brief">
                        <img src="/images/avatar-default.png" id="user-avatar" alt="头像" style="cursor:pointer;" onclick="document.getElementById('avatarFile').click()">
                        <input type="file" id="avatarFile" accept="image/*" style="display:none;" onchange="handleAvatarUpload(this)">
                        <div class="username" id="user-name">--</div>
                    </div>
                    <ul class="user-menu">
                        <li><a href="/user/profile" class="active">👤 个人信息</a></li>
                        <li><a href="/order/list">📋 我的订单</a></li>
                        <li><a href="/user/address">📍 收货地址</a></li>
                        <li><a href="/user/password">🔒 修改密码</a></li>
                    </ul>
                </aside>
                <div class="user-content">
                    <h3>个人信息</h3>
                    <form id="profile-form" onsubmit="return saveProfile(event)">
                        <div class="form-group">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">昵称</label>
                            <input type="text" class="form-control" id="nickname" placeholder="请输入昵称">
                        </div>
                        <div class="form-group">
                            <label class="form-label">性别</label>
                            <select class="form-control" id="gender">
                                <option value="0">未知</option>
                                <option value="1">男</option>
                                <option value="2">女</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email" placeholder="请输入邮箱">
                        </div>
                        <div class="form-group">
                            <label class="form-label">手机号</label>
                            <input type="tel" class="form-control" id="phone" readonly>
                        </div>
                        <button type="submit" class="btn btn-primary">保存修改</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/header :: footer"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script th:replace="fragments/header :: scripts"></script>
    <script>
        if (!isLoggedIn()) location.href = '/login?redirect=/user/profile';

        async function loadProfile() {
            try {
                const user = getUser();
                const data = await get('/users/me?userId=' + (user ? user.id : ''));
                const u = data.data;
                document.getElementById('username').value = u.username;
                document.getElementById('nickname').value = u.nickname || '';
                document.getElementById('gender').value = u.gender || 0;
                document.getElementById('email').value = u.email || '';
                document.getElementById('phone').value = u.phone || '';
                document.getElementById('user-name').textContent = u.nickname || u.username;
                if (u.avatar) document.getElementById('user-avatar').src = u.avatar;
            } catch (e) {}
        }

        async function saveProfile(e) {
            e.preventDefault();
            try {
                const user = getUser();
                await put('/users/me', {
                    id: user ? user.id : null,
                    nickname: document.getElementById('nickname').value,
                    gender: parseInt(document.getElementById('gender').value),
                    email: document.getElementById('email').value
                });
                showToast('保存成功');
                loadProfile();
            } catch (e) {}
            return false;
        }

        async function handleAvatarUpload(input) {
            const file = input.files[0];
            if (!file) return;
            try {
                const user = getUser();
                if (!user || !user.id) {
                    showToast('请先登录', 'error');
                    return;
                }
                const uploadData = await upload('/upload/image', file);
                await put('/users/me', { id: user.id, avatar: uploadData.data });
                document.getElementById('user-avatar').src = uploadData.data;
                showToast('头像更新成功');
            } catch (e) {}
        }

        loadProfile();
    </script>
</body>
</html>
