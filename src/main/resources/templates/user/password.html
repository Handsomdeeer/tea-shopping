<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('修改密码')"></head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="main-content">
        <div class="container">
            <div class="user-layout">
                <aside class="user-sidebar">
                    <div class="user-profile-brief">
                        <img src="/images/avatar-default.png" id="user-avatar" alt="头像">
                        <div class="username" id="user-name">--</div>
                    </div>
                    <ul class="user-menu">
                        <li><a href="/user/profile">👤 个人信息</a></li>
                        <li><a href="/order/list">📋 我的订单</a></li>
                        <li><a href="/user/address">📍 收货地址</a></li>
                        <li><a href="/user/password" class="active">🔒 修改密码</a></li>
                    </ul>
                </aside>
                <div class="user-content">
                    <h3>修改密码</h3>
                    <form id="pwd-form" onsubmit="return changePassword(event)" style="max-width:400px;">
                        <div class="form-group">
                            <label class="form-label">原密码</label>
                            <input type="password" class="form-control" id="oldPassword" placeholder="请输入原密码" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-control" id="newPassword" placeholder="8-20位，含字母和数字" required minlength="8">
                        </div>
                        <div class="form-group">
                            <label class="form-label">确认新密码</label>
                            <input type="password" class="form-control" id="newPassword2" placeholder="请再次输入新密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary">确认修改</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/header :: footer"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script th:replace="fragments/header :: scripts"></script>
    <script>
        if (!isLoggedIn()) location.href = '/login?redirect=/user/password';

        const user = getUser();
        if (user) {
            document.getElementById('user-name').textContent = user.nickname || user.username;
            if (user.avatar) document.getElementById('user-avatar').src = user.avatar;
        }

        async function changePassword(e) {
            e.preventDefault();
            const oldPwd = document.getElementById('oldPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const newPwd2 = document.getElementById('newPassword2').value;

            if (newPwd !== newPwd2) {
                showToast('两次新密码不一致', 'error');
                return false;
            }

            try {
                const user = getUser();
                await put('/users/password?userId=' + (user ? user.id : ''), { oldPassword: oldPwd, newPassword: newPwd });
                showToast('密码修改成功，请重新登录');
                setTimeout(() => logout(), 1500);
            } catch (e) {}
            return false;
        }
    </script>
</body>
</html>
