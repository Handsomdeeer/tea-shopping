<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('收货地址')"></head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="main-content">
        <div class="container">
            <div class="user-layout">
                <aside class="user-sidebar">
                    <div class="user-profile-brief">
                        <img src="/images/avatar-default.png" id="user-avatar" alt="头像">
                        <div class="username" id="user-name">--</div>
                    </div>
                    <ul class="user-menu">
                        <li><a href="/user/profile">👤 个人信息</a></li>
                        <li><a href="/order/list">📋 我的订单</a></li>
                        <li><a href="/user/address" class="active">📍 收货地址</a></li>
                        <li><a href="/user/password">🔒 修改密码</a></li>
                    </ul>
                </aside>
                <div class="user-content">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
                        <h3 style="margin:0;">收货地址</h3>
                        <button class="btn btn-primary" onclick="openModal()">+ 添加地址</button>
                    </div>

                    <div class="address-list" id="address-list"></div>

                    <div class="empty-state" id="empty-state" style="display:none">
                        <div class="empty-icon">📍</div>
                        <p>暂无收货地址</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 地址模态框 -->
    <div class="modal-overlay" id="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">添加收货地址</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="address-form">
                    <input type="hidden" id="addr-id">
                    <div class="form-group">
                        <label class="form-label">收件人姓名</label>
                        <input type="text" class="form-control" id="receiverName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-control" id="receiverPhone" required pattern="1[3-9]\d{9}">
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
                        <div class="form-group">
                            <label class="form-label">省份</label>
                            <input type="text" class="form-control" id="province" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">城市</label>
                            <input type="text" class="form-control" id="city" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">区县</label>
                            <input type="text" class="form-control" id="district" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">详细地址</label>
                        <textarea class="form-control" id="detailAddress" required></textarea>
                    </div>
                    <div class="form-group">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;">
                            <input type="checkbox" id="isDefault">
                            设为默认地址
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveAddress()">保存</button>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/header :: footer"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script th:replace="fragments/header :: scripts"></script>
    <script>
        if (!isLoggedIn()) location.href = '/login?redirect=/user/address';

        let addresses = [];
        let editingId = null;

        async function loadAddresses() {
            try {
                const user = getUser();
                const data = await get('/addresses?userId=' + (user ? user.id : ''));
                addresses = data.data || [];
                const list = document.getElementById('address-list');
                const empty = document.getElementById('empty-state');

                if (addresses.length === 0) {
                    list.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                list.innerHTML = '';

                addresses.forEach(addr => {
                    const card = document.createElement('div');
                    card.className = 'address-card';
                    card.innerHTML = `
                        <div class="addr-header">
                            <span class="addr-name">${addr.receiverName} ${addr.receiverPhone}</span>
                            ${addr.isDefault ? '<span class="default-tag">默认</span>' : ''}
                        </div>
                        <div class="addr-detail">${addr.province}${addr.city}${addr.district}${addr.detailAddress}</div>
                        <div class="addr-actions">
                            <button class="btn btn-sm btn-secondary" onclick="editAddress(${addr.id})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteAddress(${addr.id})">删除</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {}
        }

        function openModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = '添加收货地址';
            document.getElementById('address-form').reset();
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function editAddress(id) {
            const addr = addresses.find(a => a.id === id);
            if (!addr) return;
            editingId = id;
            document.getElementById('modal-title').textContent = '编辑收货地址';
            document.getElementById('receiverName').value = addr.receiverName;
            document.getElementById('receiverPhone').value = addr.receiverPhone;
            document.getElementById('province').value = addr.province;
            document.getElementById('city').value = addr.city;
            document.getElementById('district').value = addr.district;
            document.getElementById('detailAddress').value = addr.detailAddress;
            document.getElementById('isDefault').checked = addr.isDefault;
            document.getElementById('modal').style.display = 'flex';
        }

        async function saveAddress() {
            const form = document.getElementById('address-form');
            if (!validateForm(form)) return;

            const user = getUser();
            const body = {
                receiverName: document.getElementById('receiverName').value,
                receiverPhone: document.getElementById('receiverPhone').value,
                province: document.getElementById('province').value,
                city: document.getElementById('city').value,
                district: document.getElementById('district').value,
                detailAddress: document.getElementById('detailAddress').value,
                isDefault: document.getElementById('isDefault').checked ? 1 : 0
            };

            try {
                if (editingId) {
                    await put('/addresses/' + editingId, body);
                } else {
                    await post('/addresses?userId=' + (user ? user.id : ''), body);
                }
                closeModal();
                showToast('保存成功');
                loadAddresses();
            } catch (e) {}
        }

        async function deleteAddress(id) {
            if (!await confirmDialog('确定删除该地址吗？')) return;
            try {
                await del('/addresses/' + id);
                showToast('删除成功');
                loadAddresses();
            } catch (e) {}
        }

        // 设置用户信息
        async function loadUserInfo() {
            try {
                const user = getUser();
                if (user) {
                    document.getElementById('user-name').textContent = user.nickname || user.username;
                    if (user.avatar) document.getElementById('user-avatar').src = user.avatar;
                }
            } catch (e) {}
        }

        loadUserInfo();
        loadAddresses();
    </script>
</body>
</html>
