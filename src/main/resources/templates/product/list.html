<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('商品列表')"></head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="main-content">
        <div class="container">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h2 id="list-title">全部商品</h2>
                <div style="display:flex;gap:10px;align-items:center;">
                    <select class="form-control" id="sort-select" onchange="changeSort()" style="width:auto;min-width:120px;">
                        <option value="">默认排序</option>
                        <option value="sales_desc">销量优先</option>
                        <option value="price_asc">价格从低到高</option>
                        <option value="price_desc">价格从高到低</option>
                    </select>
                </div>
            </div>

            <div class="product-grid" id="product-grid"></div>
            <div class="empty-state" id="empty-state" style="display:none">
                <div class="empty-icon">🍵</div>
                <p>没有找到相关商品</p>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <footer th:replace="fragments/header :: footer"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script th:replace="fragments/header :: scripts"></script>
    <script>
        const params = new URLSearchParams(location.search);
        let currentPage = 1;
        let pageSize = 12;
        let keyword = params.get('keyword') || '';
        let categoryId = params.get('categoryId') || '';
        let sortField = '';
        let sortOrder = '';

        if (keyword) document.getElementById('list-title').textContent = '搜索：' + keyword;
        if (document.getElementById('search-input')) document.getElementById('search-input').value = keyword;

        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;"><div class="loading"></div></div>';

            try {
                let url = '/products?pageNum=' + currentPage + '&pageSize=' + pageSize + '&status=1';
                if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
                if (categoryId) url += '&categoryId=' + categoryId;
                if (sortField) url += '&sort=' + sortField + '&order=' + sortOrder;

                const data = await get(url);
                const page = data.data;
                grid.innerHTML = '';

                if (!page.list || page.list.length === 0) {
                    empty.style.display = 'block';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }
                empty.style.display = 'none';

                page.list.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.onclick = () => location.href = '/product/detail?id=' + p.id;
                    card.innerHTML = `
                        <img class="product-image" src="${p.imageUrl || '/images/default.jpg'}" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-desc">${p.description || ''}</div>
                            <div class="product-price">
                                <span class="price">${formatPrice(p.price)}</span>
                                ${p.originalPrice ? '<span class="original-price">' + formatPrice(p.originalPrice) + '</span>' : ''}
                            </div>
                            <div class="product-sales">已售 ${p.sales || 0} 件</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                renderPagination(page.total, page.pageNum, page.pageSize);
            } catch (e) {
                grid.innerHTML = '';
                empty.style.display = 'block';
            }
        }

        function changeSort() {
            const val = document.getElementById('sort-select').value;
            if (!val) {
                sortField = ''; sortOrder = '';
            } else {
                const parts = val.split('_');
                sortField = parts[0];
                sortOrder = parts[1];
            }
            currentPage = 1;
            loadProducts();
        }

        function renderPagination(total, pageNum, pageSize) {
            const totalPages = Math.ceil(total / pageSize);
            const el = document.getElementById('pagination');
            let html = '';
            if (pageNum > 1) html += `<a onclick="goPage(${pageNum - 1})">上一页</a>`;
            else html += `<span class="disabled">上一页</span>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === pageNum) html += `<span class="current">${i}</span>`;
                else if (i <= 3 || i > totalPages - 3 || Math.abs(i - pageNum) <= 1) html += `<a onclick="goPage(${i})">${i}</a>`;
                else if (Math.abs(i - pageNum) === 2) html += `<span>...</span>`;
            }
            if (pageNum < totalPages) html += `<a onclick="goPage(${pageNum + 1})">下一页</a>`;
            else html += `<span class="disabled">下一页</span>`;
            el.innerHTML = html;
        }

        function goPage(page) {
            currentPage = page;
            loadProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        loadProducts();
    </script>
</body>
</html>
