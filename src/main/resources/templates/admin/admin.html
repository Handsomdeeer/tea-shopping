<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员管理 - 潮茶商城</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-logo">🍵 潮茶商城后台</div>
            <ul class="admin-menu">
                <li><a href="/admin/dashboard">📊 数据统计</a></li>
                <li><a href="/admin/category/list">🏷️ 分类管理</a></li>
                <li><a href="/admin/product/list">📦 商品管理</a></li>
                <li><a href="/admin/order/list">📋 订单管理</a></li>
                <li><a href="/admin/payment">💳 支付配置</a></li>
                <li><a href="/admin/banner/list">🖼️ 图片管理</a></li>
                <li><a href="/admin/admin" class="active">👤 管理员管理</a></li>
                <li><a href="javascript:void(0)" onclick="logout()">🚪 退出登录</a></li>
            </ul>
        </aside>
        <div class="admin-main">
            <div class="admin-header">
                <h2>管理员管理</h2>
            </div>

            <div class="card" style="max-width:500px;margin-bottom:24px;">
                <div class="card-body">
                    <h3 class="card-title">添加管理员</h3>
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <label class="form-label">真实姓名</label>
                        <input type="text" class="form-control" id="realName" placeholder="请输入真实姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">角色</label>
                        <select class="form-control" id="role">
                            <option value="1">普通管理员</option>
                            <option value="0">超级管理员</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="addAdmin()">添加</button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">管理员列表</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>真实姓名</th>
                                <th>角色</th>
                                <th>状态</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="admin-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        if (!isLoggedIn()) location.href = '/admin/login';

        async function loadAdmins() {
            try {
                const data = await get('/admin/list');
                const list = data.data || [];
                const tbody = document.getElementById('admin-list');
                tbody.innerHTML = list.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.username}</td>
                        <td>${item.realName || '-'}</td>
                        <td>${item.role === 0 ? '超级管理员' : '普通管理员'}</td>
                        <td>${item.status === 1 ? '正常' : '禁用'}</td>
                        <td>${item.createTime || '-'}</td>
                    </tr>
                `).join('');
            } catch (e) {}
        }

        async function addAdmin() {
            const body = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                realName: document.getElementById('realName').value.trim(),
                role: parseInt(document.getElementById('role').value)
            };
            if (!body.username || !body.password) {
                showToast('用户名和密码不能为空', 'error');
                return;
            }
            try {
                await post('/admin', body);
                showToast('添加成功');
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('realName').value = '';
                loadAdmins();
            } catch (e) {}
        }

        loadAdmins();
    </script>
</body>
</html>
