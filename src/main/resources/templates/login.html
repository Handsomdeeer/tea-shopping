<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('用户登录')"></head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="auth-page">
        <div class="auth-box">
            <h2>用户登录</h2>
            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">登录</button>
            </form>
            <div class="auth-footer">
                还没有账号？<a href="/register">立即注册</a>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/header :: footer"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script th:replace="fragments/header :: scripts"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const data = await post('/users/login', {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                });

                const user = data.data;
                localStorage.setItem('token', user.token);
                localStorage.setItem('user', JSON.stringify(user));
                showToast('登录成功');
                setTimeout(() => location.href = '/', 1000);
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '登录';
            }
            return false;
        }
    </script>
</body>
</html>
