<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('用户注册')"></head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main class="auth-page">
        <div class="auth-box">
            <h2>用户注册</h2>
            <form id="register-form" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="6-20位字母数字组合" required minlength="6" maxlength="20">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="8-20位，含字母和数字" required minlength="8" maxlength="20">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-control" id="password2" placeholder="请再次输入密码" required>
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-control" id="phone" placeholder="请输入手机号" required pattern="1[3-9]\d{9}">
                </div>
                <div class="form-group">
                    <label class="form-label">短信验证码</label>
                    <div style="display:flex;gap:10px;">
                        <input type="text" class="form-control" id="verifyCode" placeholder="请输入验证码" required style="flex:1">
                        <button type="button" class="btn btn-secondary" onclick="sendCode(this)" id="send-btn">获取验证码</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">注册</button>
            </form>
            <div class="auth-footer">
                已有账号？<a href="/login">立即登录</a>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/header :: footer"></footer>

    <script th:src="@{/js/app.js}"></script>
    <script th:replace="fragments/header :: scripts"></script>
    <script>
        let countdown = 0;

        function sendCode(btn) {
            if (countdown > 0) return;
            const phone = document.getElementById('phone').value;
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号', 'error');
                return;
            }
            showToast('验证码已发送');
            countdown = 60;
            btn.disabled = true;
            btn.textContent = countdown + 's';
            const timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                } else {
                    btn.textContent = countdown + 's';
                }
            }, 1000);
        }

        async function handleRegister(e) {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            const pwd2 = document.getElementById('password2').value;
            if (pwd !== pwd2) {
                showToast('两次密码不一致', 'error');
                return false;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                await post('/users/register', {
                    username: document.getElementById('username').value,
                    password: pwd,
                    phone: document.getElementById('phone').value,
                    verifyCode: document.getElementById('verifyCode').value
                });
                showToast('注册成功，请登录');
                setTimeout(() => location.href = '/login', 1500);
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '注册';
            }
            return false;
        }
    </script>
</body>
</html>
